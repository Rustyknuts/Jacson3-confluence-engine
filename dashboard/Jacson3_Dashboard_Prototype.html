<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jacson3 WSAPT Dashboard — Prototype</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

  :root{
    --bg:#0B0E11;
    --panel:#12161B;
    --panel-2:#171C22;
    --line:#222831;
    --line-soft:#1B2026;
    --text:#E7ECF1;
    --text-dim:#8A94A1;
    --text-faint:#5C6571;
    --accent:#3DDC97;       /* preservation green */
    --accent-dim:#1E5C42;
    --amber:#E0A93B;        /* stale/caution */
    --amber-dim:#5C4A20;
    --red:#E2566A;          /* breach/bearish */
    --red-dim:#5C2530;
    --blue:#5B9BD8;         /* accumulation/info */
    --gold:#C9A24B;         /* Larsson Line proprietary accent */
    --crypto:#9C7CE0;
    --tech:#5B9BD8;
    --util:#3DDC97;
  }

  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Space Grotesk',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}

  ::selection{background:var(--accent-dim);color:#fff;}

  button{font-family:inherit;}
  input{font-family:inherit;}

  .scrollbar::-webkit-scrollbar{width:8px;height:8px;}
  .scrollbar::-webkit-scrollbar-track{background:transparent;}
  .scrollbar::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}

  @keyframes pulse-soft{
    0%,100%{opacity:1;}
    50%{opacity:.45;}
  }
  .pulse{animation:pulse-soft 2.2s ease-in-out infinite;}

  @keyframes slidein{
    from{opacity:0;transform:translateY(6px);}
    to{opacity:1;transform:translateY(0);}
  }
  .slidein{animation:slidein .35s ease-out;}
</style>
</head>
<body>
<div id="root"></div>
